<section>
  <form class="order-form" [formGroup]="orderForm">
    <div class="order-form__food-name">
      <input
        class="order-form__input"
        type="text"
        formControlName="foodName"
        placeholder="Ex: Polenta frita"
        [maxlength]="constants.MAX_LENGTH_FOOD_NAME"
        [ngClass]="{ 'order-form__input--error': isFormValid() }" />
      <div class="order-form__error">
        <p *ngIf="isFormValid() && foodName.hasError('maxlength')">
          O nome não pode ter mais de {{ constants.MAX_LENGTH_FOOD_NAME }} caracteres.
        </p>
        <p *ngIf="isFormValid() && foodName.hasError('required')">Ops! Esse nome está em branco.</p>
      </div>
    </div>

    <div class="order-form__price">
      <div class="order-form__price-wrapper">
        <span class="order-form__prefix">R$</span>
        <input
          class="order-form__input order-form__input--price"
          formControlName="price"
          placeholder="0,00"
          type="tel"
          currencyMask
          [options]="{ prefix: '', thousands: '.', decimal: ',' }"
          [ngClass]="{
            'order-form__input--error': price.dirty && price.invalid
          }" />
      </div>
      <div class="order-form__error" *ngIf="price.invalid && price.dirty">
        <p>Digite o valor do item.</p>
      </div>
    </div>

    <div class="order-form__quantity">
      <button
        type="button"
        class="order-form__button order-form__button--decrement"
        [attr.aria-label]="'Diminuir quantidade'"
        [disabled]="quantity.value <= constants.MIN_QUANTITY"
        (click)="updateQuantity('subtract')">
        -
      </button>
      <input
        class="order-form__input order-form__input--quantity"
        type="number"
        formControlName="quantity"
        [attr.aria-label]="'Quantidade do item'"
        [min]="constants.MIN_QUANTITY" />
      <button
        type="button"
        class="order-form__button order-form__button--increment"
        [attr.aria-label]="'Aumentar quantidade'"
        (click)="updateQuantity('add')">
        +
      </button>
    </div>

    <ng-content></ng-content>
  </form>
</section>
